<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d8e0ea; stroke-width: 2; rx: 18; }
      .title { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 30px; font-weight: 800; fill: #182230; text-anchor: middle; dominant-baseline: middle; }
      .section-title { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 21px; font-weight: 800; fill: #263445; text-anchor: middle; dominant-baseline: middle; }
      .box-text { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 17px; font-weight: 700; fill: #1f2a37; text-anchor: middle; dominant-baseline: middle; }
      .small-text { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 14px; font-weight: 600; fill: #4b5563; text-anchor: middle; dominant-baseline: middle; }
      .note-text { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 15px; font-weight: 700; fill: #52606d; text-anchor: middle; dominant-baseline: middle; }
      .ui { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 14; }
      .service { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .model { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; }
      .interface { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .thread { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 14; }
      .exception { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; rx: 14; }
      .arrow { stroke: #536273; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .sync-arrow { stroke: #ef4444; stroke-width: 2.6; fill: none; marker-end: url(#redArrow); stroke-dasharray: 8 6; }
      .group-label { font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif; font-size: 15px; font-weight: 800; fill: #334155; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#536273"/>
    </marker>
    <marker id="redArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>
  <text class="title" x="800" y="55">스마트 도서관 좌석·도서 대여 관리 시뮬레이터 시스템 설계 구조도</text>
  <text class="note-text" x="800" y="92">콘솔 UI → 서비스 계층 → 도메인 모델 → 동시 요청 처리 흐름</text>

  <rect class="panel" x="50" y="130" width="1500" height="790"/>

  <text class="section-title" x="175" y="175">콘솔 메뉴</text>
  <text class="section-title" x="500" y="175">서비스 계층</text>
  <text class="section-title" x="850" y="175">도메인 모델</text>
  <text class="section-title" x="1190" y="175">인터페이스·예외</text>
  <text class="section-title" x="1400" y="175">멀티스레드</text>

  <rect class="ui" x="80" y="220" width="190" height="72"/>
  <text class="box-text" x="175" y="246">Main</text>
  <text class="small-text" x="175" y="270">프로그램 실행·메뉴 관리</text>

  <rect class="ui" x="80" y="335" width="190" height="74"/>
  <text class="box-text" x="175" y="361">사용자 입력</text>
  <text class="small-text" x="175" y="385">대여·반납·예약·조회</text>

  <rect class="ui" x="80" y="450" width="190" height="74"/>
  <text class="box-text" x="175" y="476">현황판</text>
  <text class="small-text" x="175" y="500">도서·좌석 상태 집계</text>

  <rect class="ui" x="80" y="565" width="190" height="74"/>
  <text class="box-text" x="175" y="591">사용자 이용 현황</text>
  <text class="small-text" x="175" y="615">대여 도서·예약 좌석</text>

  <rect class="service" x="390" y="230" width="220" height="78"/>
  <text class="box-text" x="500" y="258">UserService</text>
  <text class="small-text" x="500" y="282">사용자 등록·조회</text>

  <rect class="service" x="390" y="385" width="220" height="82"/>
  <text class="box-text" x="500" y="411">LibraryService</text>
  <text class="small-text" x="500" y="436">도서 검색·대여·반납</text>

  <rect class="service" x="390" y="545" width="220" height="82"/>
  <text class="box-text" x="500" y="571">SeatService</text>
  <text class="small-text" x="500" y="596">좌석 조회·예약·취소</text>

  <rect class="model" x="745" y="205" width="210" height="74"/>
  <text class="box-text" x="850" y="231">User</text>
  <text class="small-text" x="850" y="255">추상 클래스</text>

  <rect class="model" x="680" y="315" width="160" height="68"/>
  <text class="box-text" x="760" y="340">Student</text>
  <text class="small-text" x="760" y="362">최대 3권</text>

  <rect class="model" x="850" y="315" width="160" height="68"/>
  <text class="box-text" x="930" y="340">Professor</text>
  <text class="small-text" x="930" y="362">최대 10권</text>

  <rect class="model" x="765" y="405" width="160" height="68"/>
  <text class="box-text" x="845" y="430">GeneralUser</text>
  <text class="small-text" x="845" y="452">최대 2권</text>

  <rect class="model" x="710" y="555" width="220" height="82"/>
  <text class="box-text" x="820" y="581">Book</text>
  <text class="small-text" x="820" y="606">대여 가능·대여 중</text>

  <rect class="model" x="710" y="705" width="220" height="82"/>
  <text class="box-text" x="820" y="731">Seat</text>
  <text class="small-text" x="820" y="756">예약 가능·예약 중</text>

  <rect class="interface" x="1080" y="345" width="220" height="78"/>
  <text class="box-text" x="1190" y="373">Borrowable</text>
  <text class="small-text" x="1190" y="397">borrow / returnBook</text>

  <rect class="interface" x="1080" y="510" width="220" height="78"/>
  <text class="box-text" x="1190" y="538">Reservable</text>
  <text class="small-text" x="1190" y="562">reserve / cancel</text>

  <rect class="exception" x="1080" y="675" width="220" height="78"/>
  <text class="box-text" x="1190" y="703">LibraryException</text>
  <text class="small-text" x="1190" y="727">실패 원인 메시지</text>

  <rect class="thread" x="1340" y="335" width="170" height="78"/>
  <text class="box-text" x="1425" y="363">BorrowTask</text>
  <text class="small-text" x="1425" y="387">동시 도서 대여</text>

  <rect class="thread" x="1340" y="520" width="170" height="86"/>
  <text class="box-text" x="1425" y="548">SeatReservation</text>
  <text class="box-text" x="1425" y="571">Task</text>
  <text class="small-text" x="1425" y="592">동시 좌석 예약</text>

  <rect class="thread" x="1340" y="700" width="170" height="82"/>
  <text class="box-text" x="1425" y="728">TaskResult</text>
  <text class="small-text" x="1425" y="752">성공·실패 표 출력</text>

  <path class="arrow" d="M175 292 L175 335"/>
  <path class="arrow" d="M270 372 C315 372, 330 269, 390 269"/>
  <path class="arrow" d="M270 372 C320 372, 330 426, 390 426"/>
  <path class="arrow" d="M270 487 C320 487, 330 426, 390 426"/>
  <path class="arrow" d="M270 602 C320 602, 330 586, 390 586"/>
  <path class="arrow" d="M610 269 C665 269, 690 242, 745 242"/>
  <path class="arrow" d="M610 426 C655 426, 670 596, 710 596"/>
  <path class="arrow" d="M610 586 L710 586"/>
  <path class="arrow" d="M610 586 C660 586, 675 746, 710 746"/>

  <path class="arrow" d="M850 279 L760 315"/>
  <path class="arrow" d="M850 279 L930 315"/>
  <path class="arrow" d="M850 279 L845 405"/>

  <path class="arrow" d="M930 596 C995 596, 1015 384, 1080 384"/>
  <path class="arrow" d="M930 746 C995 746, 1015 549, 1080 549"/>
  <path class="arrow" d="M930 596 C1000 596, 1010 714, 1080 714"/>
  <path class="arrow" d="M930 746 C1000 746, 1010 714, 1080 714"/>

  <path class="arrow" d="M1300 384 L1340 374"/>
  <path class="arrow" d="M1300 549 L1340 563"/>
  <path class="arrow" d="M1425 413 L1425 700"/>
  <path class="arrow" d="M1425 606 L1425 700"/>

  <path class="sync-arrow" d="M1340 374 C1250 285, 1045 300, 940 560"/>
  <text class="group-label" x="1165" y="300">synchronized로 도서 충돌 방지</text>

  <path class="sync-arrow" d="M1340 563 C1220 625, 1050 665, 940 725"/>
  <text class="group-label" x="1165" y="650">synchronized로 좌석 충돌 방지</text>

  <rect x="95" y="815" width="1410" height="62" rx="16" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
  <text class="note-text" x="800" y="840">핵심 처리 흐름: Main에서 사용자의 메뉴 선택을 받고, Service가 도메인 객체(Book·Seat·User)를 조작한다.</text>
  <text class="note-text" x="800" y="864">동시 요청 메뉴에서는 Runnable Task가 같은 자원에 접근하지만 synchronized가 중복 대여·중복 예약을 차단한다.</text>
</svg>
